name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, notarize, publish
    runs-on: macos-26
    timeout-minutes: 60
    env:
      APP_NAME: Glint
      BUNDLE_ID: app.glint.Glint
      # Tag is set by an owner with push permission, but isolate via env
      # so we never interpolate ${{ github.ref_name }} directly into shell.
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Derive version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Strip leading 'v' — REF_NAME is from env, never inlined into shell.
          version="${REF_NAME#v}"
          # Validate shape (defense-in-depth even though tag pattern is enforced upstream).
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "Refusing to release: tag '$REF_NAME' is not semver." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve ghostty SHA
        id: ghostty
        run: |
          set -euo pipefail
          sha="$(git -C ghostty rev-parse HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache GhosttyKit.xcframework
        id: ghostty-cache
        uses: actions/cache@v4
        with:
          path: |
            Vendor/GhosttyKit.xcframework
            Vendor/.ghosttykit-sha
          key: ghosttykit-${{ runner.os }}-${{ steps.ghostty.outputs.sha }}

      - name: Download GhosttyKit
        if: steps.ghostty-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup-ghosttykit.sh

      - name: Stamp version into Info.plist
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          BUILD_NUMBER="$(date +%Y%m%d%H%M)"
          plutil -replace CFBundleShortVersionString -string "$VERSION" Glint/Resources/Info.plist
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" Glint/Resources/Info.plist
          # Sparkle compares <sparkle:version> against CFBundleVersion to
          # decide if an update is newer; the appcast must use the same
          # build number we just stamped here, not the human "0.0.3".
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Archive (Release)
        run: |
          set -euo pipefail
          xcodebuild \
            -project Glint.xcodeproj \
            -scheme Glint \
            -configuration Release \
            -derivedDataPath build \
            -archivePath build/Glint.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            archive

      - name: Export .app
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -R build/Glint.xcarchive/Products/Applications/Glint.app dist/
          # Replace the broken linker-signed ad-hoc signature with a real
          # ad-hoc codesign. Xcode's linker-signed bundles fail
          # `SecStaticCodeCheckValidity` with "code has no resources but
          # signature indicates they must be present" because there's no
          # _CodeSignature/CodeResources manifest. Sparkle runs the same
          # check during install and rejects the update as "not properly
          # signed". `codesign --force --deep --sign -` rebuilds the
          # signature blob *and* writes the resources manifest, so the
          # bundle now validates even without a Developer ID certificate.
          codesign --force --deep --sign - dist/Glint.app
          codesign --verify --verbose dist/Glint.app

      # ─── Optional: Apple Developer ID signing + notarization ───────────
      # Skipped automatically when APPLE_CERT_P12_BASE64 secret is not set,
      # giving you an unsigned (ad-hoc) build that still works via the Cask
      # postinstall xattr -dr com.apple.quarantine trick.
      - name: Codesign + notarize
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          HAS_APPLE_CERT: ${{ secrets.APPLE_CERT_P12_BASE64 != '' }}
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_NOTARY_ID: ${{ secrets.APPLE_NOTARY_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
        run: bash scripts/sign-and-notarize.sh dist/Glint.app

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          DMG="dist/Glint-${VERSION}.dmg"
          STAGING="$(mktemp -d)"
          cp -R dist/Glint.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "Glint $VERSION" \
            -srcfolder "$STAGING" \
            -fs HFS+ \
            -format UDZO \
            -imagekey zlib-level=9 \
            "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      # ─── Sparkle EdDSA signing of the DMG ──────────────────────────────
      # When SPARKLE_ED_PRIV_KEY secret is set, sign with sparkle's
      # `sign_update` tool. The signature lands in appcast.xml.
      - name: Sparkle sign
        id: sparkle
        if: ${{ env.HAS_SPARKLE_KEY == 'true' }}
        env:
          HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIV_KEY != '' }}
          SPARKLE_ED_PRIV_KEY: ${{ secrets.SPARKLE_ED_PRIV_KEY }}
          DMG_PATH: ${{ env.DMG }}
        run: |
          set -euo pipefail
          # Persist the key to a file with 0600, never echo it.
          umask 077
          printf '%s' "$SPARKLE_ED_PRIV_KEY" > "$RUNNER_TEMP/sparkle.key"
          # `sign_update` ships inside Sparkle's distribution; we download
          # the matching version once and cache it. The binary handles the
          # EdDSA private key, so pin the artifact's sha256 (same policy as
          # scripts/setup-ghosttykit.sh) — a compromised/squatted release
          # asset must fail loudly, not sign our updates.
          SPARKLE_VERSION="2.6.4"
          SPARKLE_SHA256="50612a06038abc931f16011d7903b8326a362c1074dabccb718404ce8e585f0b"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/sparkle.tar.xz"
          ACTUAL_SHA256="$(shasum -a 256 "$RUNNER_TEMP/sparkle.tar.xz" | awk '{print $1}')"
          if [ "$ACTUAL_SHA256" != "$SPARKLE_SHA256" ]; then
            echo "ERROR: Sparkle ${SPARKLE_VERSION} sha256 mismatch." >&2
            echo "  expected: $SPARKLE_SHA256" >&2
            echo "  actual:   $ACTUAL_SHA256" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          SIGN="$RUNNER_TEMP/sparkle/bin/sign_update"
          # sign_update prints e.g. `sparkle:edSignature="..." length="..."`
          SIG_LINE="$("$SIGN" -f "$RUNNER_TEMP/sparkle.key" "$DMG_PATH")"
          echo "sig_line=$SIG_LINE" >> "$GITHUB_OUTPUT"
          rm -f "$RUNNER_TEMP/sparkle.key"

      # Appcast is only consumed by Sparkle in-app updates. Skip the
      # update + commit when no Sparkle key is configured — there is no
      # consumer for it and trying to `pip install defusedxml` blows up
      # on PEP-668-managed Pythons (macos runner default).
      - name: Update appcast.xml
        if: ${{ env.HAS_SPARKLE_KEY == 'true' }}
        env:
          HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIV_KEY != '' }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          DMG_PATH: ${{ env.DMG }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SIG_LINE: ${{ steps.sparkle.outputs.sig_line }}
        run: bash scripts/update-appcast.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIV_KEY != '' }}
        with:
          # appcast.xml is conditional — empty line is ignored by softprops.
          files: |
            ${{ env.DMG }}
            ${{ env.HAS_SPARKLE_KEY == 'true' && 'appcast.xml' || '' }}
          generate_release_notes: true
          fail_on_unmatched_files: false

      - name: Commit updated appcast on main
        if: ${{ env.HAS_SPARKLE_KEY == 'true' }}
        env:
          HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIV_KEY != '' }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Switch to main so the appcast lives on a stable branch GitHub
          # Pages / Sparkle can poll from a permalink. The freshly
          # generated appcast.xml in the workspace is untracked, so
          # `git checkout main` keeps it around — just stage it directly
          # (the tag's commit on main never carried an appcast.xml).
          git fetch origin main
          git checkout main
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "appcast already up to date"
          else
            git commit -m "release: appcast for v${VERSION}"
            git push origin main
          fi
