name: Glint
options:
  bundleIdPrefix: app.glint
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  # XcodeGen expands AppIcon.icon into loose png/json Copy Resources entries,
  # which breaks Icon Composer packaging (no AppIcon.icns in the .app).
  # Re-wire as a single wrapper.icon after every generate.
  postGenCommand: python3 scripts/fix-appicon-pbxproj.py

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

# Fork uses in-app GitHub Release DMG updater (UpdaterController) instead of Sparkle.
packages: {}

targets:
  Glint:
    type: application
    platform: macOS
    sources:
      - path: Glint
        excludes:
          - "**/.DS_Store"
    resources:
      # AppIcon.icon is re-attached as wrapper.icon by postGenCommand
      # (scripts/fix-appicon-pbxproj.py). Do not list it as a recursive
      # folder here — XcodeGen would split it into loose files again.
      - path: Glint/Resources
        excludes:
          - AppIcon.icon
          - AppIcon.icon/**
    settings:
      base:
        PRODUCT_NAME: Glint
        PRODUCT_BUNDLE_IDENTIFIER: app.glint.Glint
        INFOPLIST_FILE: Glint/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Glint/Resources/Glint.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Glint/App/Glint-Bridging-Header.h
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS:
          - "$(SRCROOT)/Vendor"
        OTHER_LDFLAGS:
          - "-framework"
          - "Metal"
          - "-framework"
          - "MetalKit"
          - "-framework"
          - "QuartzCore"
          - "-framework"
          - "CoreText"
          - "-framework"
          - "AppKit"
          - "-framework"
          - "Carbon"
          - "-framework"
          - "IOKit"
          - "-framework"
          - "Security"
          - "-framework"
          - "UserNotifications"
          - "-lc++"
      configs:
        # Dev builds get a separate bundle id so macOS treats them as a
        # different app: UserDefaults.standard reads from app.glint.Glint.dev,
        # Persistence writes into the Glint-Dev dir, and toggles you flip
        # in one build don't leak into the other. First dev launch copies
        # the prod glint.* defaults across (see GlintApp.init).
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: app.glint.Glint.dev
    dependencies:
      - framework: Vendor/GhosttyKit.xcframework
        embed: false

  GlintTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GlintTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Glint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.glint.GlintTests
        GENERATE_INFOPLIST_FILE: YES
